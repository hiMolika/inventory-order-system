version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: inventory-db
    environment:
      - POSTGRES_DB=inventory_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=secure_postgres_pass_123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d inventory_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: inventory-backend
    environment:
      - DATABASE_URL=postgresql://postgres:secure_postgres_pass_123@db:5432/inventory_db
      - PORT=8000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:8000
    container_name: inventory-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
    name: postgres_inventory_data
